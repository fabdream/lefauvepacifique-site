# Netlify — monorepo : site statique racine + funnel Vite /bilan.
# Le site racine (index.html + assets) reste servi tel quel ; le funnel est buildé sous /bilan/.

[build]
  command = "bash netlify-build.sh"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

# Les variables VITE_* (publiques : VITE_SUPABASE_URL / ANON / STRIPE_PUBLISHABLE_KEY / FUNCTIONS_URL)
# sont à définir dans les ENV VARS du site Netlify (pas ici, pas dans le repo). Valeurs dans bilan/front-env.txt.

# Guides centralisés dans l'app (décision Fabio 25/06 : le site = vitrine → app = hub).
# La PAGE /guides redirige vers l'app (qui montre tous les guides). force = true pour l'emporter sur
# le fichier servi. ⚠️ NE PAS toucher /assets/*.pdf : les liens des emails déjà envoyés en dépendent.
[[redirects]]
  from = "/guides"
  to = "https://app.lefauvepacifique.com"
  status = 301
  force = true

[[redirects]]
  from = "/guides/*"
  to = "https://app.lefauvepacifique.com"
  status = 301
  force = true

# Bilan GRATUIT partout → l'app (décision Fabio 25/06 : le 5€ one-time retiré, tout vers l'app).
# /bilan/* (l'ancien funnel payant) redirige vers le bilan de l'app. force=true pour l'emporter sur le SPA.
# ⚠️ NE touche PAS /assets/*.pdf (route différente) : les liens des emails déjà envoyés restent servis.
[[redirects]]
  from = "/bilan/*"
  to = "https://app.lefauvepacifique.com/?action=bilan"
  status = 301
  force = true
